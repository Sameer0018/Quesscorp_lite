# Optional: Render Blueprint for backend only. Adjust if using monorepo.
services:
  - type: web
    name: hrms-lite-api
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false  # Set in dashboard to your frontend URL

databases:
  - name: hrms-lite-db
    plan: free
    databaseName: hrms_lite
    user: hrms
