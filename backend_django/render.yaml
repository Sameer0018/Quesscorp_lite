# Render Blueprint: HRMS Lite Django backend
# Create a Web Service and a PostgreSQL database, then connect the repo.

services:
  - type: web
    name: hrms-lite-api
    runtime: python
    rootDir: backend_django
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.4"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: hrms-lite-db
    plan: free
    databaseName: hrms_lite
    user: hrms
